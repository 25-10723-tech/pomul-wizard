    function beginRound() {
      state.angleDeg = 45;
      state.angleDir = Math.random() < 0.5 ? -1 : 1;
      state.hasShot = false;
      state.waitingNextRound = 0;
      state.projectile = null;
      state.stoppedProjectile = null;

    function placeTarget() {
      const point = getReachableTargetPoint();
      state.target = {
        x: point.x,
        y: point.y,
        r: 28
      };
    }

    function getReachableTargetPoint() {
      const ground = getGroundY();
      const base = getCannonBase();
      const minX = Math.max(base.x + 170, Math.min(state.width * 0.38, 360));
      const maxX = Math.max(minX + 30, Math.min(state.width - 70, base.x + 560));
      let fallback = null;

      for (let i = 0; i < 220; i++) {
        const angleDeg = 22 + Math.random() * 46;
        const rad = angleDeg * Math.PI / 180;
        const muzzle = getMuzzleAtAngle(angleDeg);
        const verticalSpeed = SHOT_SPEED * Math.sin(rad);
        const maxT = (verticalSpeed + Math.sqrt(verticalSpeed * verticalSpeed + 2 * GRAVITY * (ground - 42 - muzzle.y) / SCALE)) / GRAVITY;
        const t = maxT * (0.22 + Math.random() * 0.5);
        const point = getTrajectoryPoint(angleDeg, t);
        const visible = point.x >= minX && point.x <= maxX && point.y >= 95 && point.y <= ground - 48;

        if (visible) return point;
        if (!fallback && point.x > base.x + 150 && point.x < state.width - 60 && point.y > 80 && point.y < ground - 48) {
          fallback = point;
        }
      }

      const fallbackT = Math.max(0.7, Math.min(1.15, (state.width - base.x - 180) / (SHOT_SPEED * Math.cos(Math.PI / 4) * SCALE)));
      return fallback || getTrajectoryPoint(45, fallbackT);
    }

    function getTrajectoryPoint(angleDeg, t) {
      const rad = angleDeg * Math.PI / 180;
      const muzzle = getMuzzleAtAngle(angleDeg);
      return {
        x: muzzle.x + SHOT_SPEED * Math.cos(rad) * t * SCALE,
        y: muzzle.y + (-SHOT_SPEED * Math.sin(rad) * t + 0.5 * GRAVITY * t * t) * SCALE
      };
    }

    function getGroundY() {
      return Math.max(320, state.height - 82);
    }

    function getCannonBase() {
      return {
        x: Math.max(76, Math.min(126, state.width * 0.14)),
        y: getGroundY() - 28
      };
    }

    function getMuzzle() {
      return getMuzzleAtAngle(state.angleDeg);
    }

    function getMuzzleAtAngle(angleDeg) {
      const base = getCannonBase();
      const angle = angleDeg * Math.PI / 180;
      return {
        x: base.x + Math.cos(angle) * 58,
        y: base.y - Math.sin(angle) * 58
      };
    }

    function updateHud() {
      scoreText.textContent = state.score;
      roundText.textContent = state.round;
      angleText.textContent = Math.round(state.angleDeg);
    }

    function shoot() {
      if (state.screen !== "game" || state.hasShot || state.projectile) return;
      const angle = state.angleDeg * Math.PI / 180;
      const muzzle = getMuzzle();
      state.hasShot = true;
      state.projectile = {
        x: muzzle.x,
        y: muzzle.y,
        vx: SHOT_SPEED * Math.cos(angle),
        vy: -SHOT_SPEED * Math.sin(angle),
        r: 8,
        trail: [{ x: muzzle.x, y: muzzle.y }],
        hit: false
      };
    }

    function updateGame() {
      if (state.screen !== "game") return;

      if (!state.hasShot) {
        state.angleDeg += state.angleDir * ANGLE_SPEED * DT;
        if (state.angleDeg >= MAX_ANGLE) {
          state.angleDeg = MAX_ANGLE;
          state.angleDir = -1;
        } else if (state.angleDeg <= MIN_ANGLE) {
          state.angleDeg = MIN_ANGLE;
          state.angleDir = 1;
        }
      }

      if (state.projectile) {
        const p = state.projectile;
        p.vy += GRAVITY * DT;
        p.x += p.vx * DT * SCALE;
        p.y += p.vy * DT * SCALE;
        p.trail.push({ x: p.x, y: p.y });

        const groundHit = p.y + p.r >= getGroundY();
        const hit = distance(p.x, p.y, state.target.x, state.target.y) <= p.r + state.target.r;

        if (hit) {
          p.hit = true;
          state.score += 100;
          burst(state.target.x, state.target.y, state.character.color, 28);
          stopProjectile(Math.min(p.x, state.width), p.y);
        } else if (groundHit) {
          stopProjectile(p.x, getGroundY() - p.r);
        } else if (p.x > state.width + 120 || p.x < -120 || p.y > state.height + 120) {
          stopProjectile(p.x, Math.min(p.y, getGroundY() - p.r));
        }
      }

      if (state.hasShot && !state.projectile) {
        state.waitingNextRound++;
        if (state.waitingNextRound > 70) {
          if (state.round >= MAX_ROUNDS) {
            finishGame();
          } else {
            state.round++;
            beginRound();
          }
        }
      }

      state.particles = state.particles.filter(dot => {
        dot.x += dot.vx;
        dot.y += dot.vy;
        dot.vy += 0.08;
        dot.life -= 1;
        return dot.life > 0;
      });

      updateHud();
    }

    function stopProjectile(x, y) {
      state.stoppedProjectile = {
        ...state.projectile,
        x,
        y
      };
      state.projectile = null;
    }

    function burst(x, y, color, count) {
      for (let i = 0; i < count; i++) {
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 4 + 1;
        state.particles.push({
          x,
          y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s,
          life: Math.random() * 28 + 22,
          color
        });
      }
    }

    function saveLocalRanking(row) {

        if (!error) return data || [];
        console.warn("Supabase ranking select failed; using local fallback.", error);
      }
      return getLocalRanking();
    }

    function getLocalRanking() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    async function renderRanking() {
      const rows = await getRanking();

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"

    function distance(ax, ay, bx, by) {

    function drawBackground(time) {
      const gradient = ctx.createLinearGradient(0, 0, 0, state.height);
      gradient.addColorStop(0, "#050615");
      gradient.addColorStop(0.58, "#101947");
      gradient.addColorStop(1, "#07101f");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, state.width, state.height);

      ctx.fillStyle = "rgba(255, 240, 190, 0.95)";
      state.stars.forEach(star => {
        const twinkle = 0.45 + Math.sin(time * star.speed + star.phase) * 0.35;
        ctx.globalAlpha = Math.max(0.18, twinkle);
        ctx.fillRect(star.x, star.y, star.size, star.size);
      });
      ctx.globalAlpha = 1;

      ctx.fillStyle = "#0b1530";
      ctx.beginPath();
      ctx.arc(state.width * 0.78, 92, 34, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#f5eebf";
      ctx.beginPath();
      ctx.arc(state.width * 0.76, 86, 34, 0, Math.PI * 2);
      ctx.fill();

      const ground = getGroundY();
      ctx.fillStyle = "#0f2a38";
      ctx.fillRect(0, ground, state.width, state.height - ground);
      ctx.fillStyle = "#183f44";
      for (let x = -30; x < state.width + 30; x += 58) {
        ctx.beginPath();
        ctx.moveTo(x, ground);
        ctx.lineTo(x + 28, ground - 28);
        ctx.lineTo(x + 58, ground);
        ctx.fill();
      }
    }

    function drawGame() {
      drawTarget();
      drawCannon();
      drawProjectile(state.stoppedProjectile, 0.45);
      drawProjectile(state.projectile, 1);
      drawParticles();

      const ground = getGroundY();
      ctx.fillStyle = "rgba(255, 255, 255, 0.76)";
      ctx.font = "10px 'Press Start 2P'";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(state.hasShot ? "нГДнЩШмЭі л©ИмґФл©і лЛ§мЭМ лЭЉмЪілУЬ" : "нБіл¶≠ лШРлКФ SPACEл°Ь л∞ЬмВђ", state.width / 2, ground + 44);
    }

    function drawCannon() {
      const base = getCannonBase();
      const angle = state.angleDeg * Math.PI / 180;
      const muzzle = getMuzzle();
      const character = state.character || characters[0];

      ctx.save();
      ctx.translate(base.x, base.y);
      ctx.rotate(-angle);
      ctx.fillStyle = "#2c3348";
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.fillRect(0, -13, 62, 26);
      ctx.strokeRect(0, -13, 62, 26);
      ctx.restore();

      ctx.fillStyle = character.color;
      ctx.beginPath();
      ctx.arc(base.x, base.y + 8, 32, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.font = "27px 'Segoe UI Emoji', sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(character.emoji, base.x, base.y + 8);

      ctx.fillStyle = "#ffd166";
      ctx.beginPath();
      ctx.arc(muzzle.x, muzzle.y, 7, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(255, 209, 102, 0.34)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(base.x, base.y);
      for (let i = 1; i <= 28; i++) {
        const t = i / 28;
        const previewVx = SHOT_SPEED * Math.cos(angle);
        const previewVy = -SHOT_SPEED * Math.sin(angle) + GRAVITY * (t * 1.6);
        const x = muzzle.x + previewVx * (t * 1.6) * SCALE;
        const y = muzzle.y + previewVy * (t * 1.6) * SCALE * 0.5;
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    function drawTarget() {
      if (!state.target) return;
      const { x, y, r } = state.target;
      if (targetImage.complete && targetImage.naturalWidth > 0) {
        ctx.drawImage(targetImage, x - r, y - r, r * 2, r * 2);
        return;
      }
      ctx.fillStyle = "#ff4e6f";
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 4;
      ctx.stroke();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(x, y, r * 0.42, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ff4e6f";
      ctx.beginPath();
      ctx.arc(x, y, r * 0.18, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawProjectile(projectile, alpha) {
      if (!projectile) return;
      ctx.save();
      projectile.trail.forEach((point, index) => {
        ctx.globalAlpha = alpha * (0.18 + index / projectile.trail.length * 0.58);
        ctx.fillStyle = state.character ? state.character.color : "#ffd166";
        ctx.beginPath();
        ctx.arc(point.x, point.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = alpha;
      ctx.fillStyle = projectile.hit ? "#76f7aa" : "#fff4a6";
      ctx.beginPath();
      ctx.arc(projectile.x, projectile.y, projectile.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawParticles() {
      state.particles.forEach(dot => {
        ctx.globalAlpha = Math.max(0, dot.life / 50);
        ctx.fillStyle = dot.color;
        ctx.fillRect(dot.x, dot.y, 5, 5);
      });
      ctx.globalAlpha = 1;
    }

    function loop(time) {
      drawBackground(time);
      updateGame();
      if (state.screen === "game") drawGame();
      requestAnimationFrame(loop);
    }

    document.getElementById("goSelectBtn").addEventListener("click", () => showScreen("select"));
    document.getElementById("goRankingBtn").addEventListener("click", () => showScreen("ranking"));
    document.getElementById("selectBackBtn").addEventListener("click", () => showScreen("start"));
    document.getElementById("startGameBtn").addEventListener("click", () => {
      if (validateName()) startGame();
    });
    document.getElementById("againBtn").addEventListener("click", () => startGame());
    document.getElementById("resultRankBtn").addEventListener("click", () => showScreen("ranking"));
    document.getElementById("rankPlayBtn").addEventListener("click", () => showScreen("select"));
    document.getElementById("rankHomeBtn").addEventListener("click", () => showScreen("start"));

    nicknameInput.addEventListener("input", () => {
      nicknameInput.value = nicknameInput.value.replace(/\s/g, "").slice(0, 8);
      validateName();
    });

    canvas.addEventListener("pointerdown", () => shoot());

    window.addEventListener("keydown", event => {
      if (event.key === " ") {
        event.preventDefault();
        shoot();
      }
    });

    window.addEventListener("resize", resize);

    renderCharacterCards();
    resize();
    validateName();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
